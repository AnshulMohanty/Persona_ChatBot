<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chat with AI personas of Scaler's Anshuman Singh, Abhimanyu Saxena, and Kshitij Mishra">
  <title>Scaler Personas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Scaler Personas</h1>
        <p class="logo-sub">Prompt Engineering Project</p>
      </div>
      <nav class="persona-nav">
        <button class="persona-btn active" data-persona="anshuman" id="btn-anshuman">
          <span class="persona-avatar" style="background:#2563eb;">AS</span>
          <div class="persona-info">
            <span class="persona-name">Anshuman Singh</span>
            <span class="persona-role">Co-founder</span>
          </div>
        </button>
        <button class="persona-btn" data-persona="abhimanyu" id="btn-abhimanyu">
          <span class="persona-avatar" style="background:#059669;">AX</span>
          <div class="persona-info">
            <span class="persona-name">Abhimanyu Saxena</span>
            <span class="persona-role">Co-founder</span>
          </div>
        </button>
        <button class="persona-btn" data-persona="kshitij" id="btn-kshitij">
          <span class="persona-avatar" style="background:#d97706;">KM</span>
          <div class="persona-info">
            <span class="persona-name">Kshitij Mishra</span>
            <span class="persona-role">Head of Instructors</span>
          </div>
        </button>
      </nav>
      <div class="sidebar-footer">
        <p>Built for Scaler Academy</p>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header" id="chat-header">
        <button class="menu-btn" id="menu-btn" aria-label="Toggle menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="header-avatar" id="header-avatar" style="background:#2563eb;">AS</span>
        <div class="header-info">
          <span class="header-name" id="header-name">Anshuman Singh</span>
          <span class="header-role" id="header-role">Co-founder, Scaler & InterviewBit</span>
        </div>
      </header>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-input-area" id="chat-input-area">
        <div class="input-wrapper">
          <textarea
            id="message-input"
            class="message-input"
            placeholder="Type your message..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="send-btn" aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
