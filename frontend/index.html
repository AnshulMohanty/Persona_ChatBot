<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Persona Chatbot — chat with persona simulations of tech industry leaders">
  <title>Persona Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" id="app">

    <div class="landing-screen" id="landing-screen">
      <div class="landing-content">
        <h1 class="landing-title">Persona Chatbot</h1>
        <p class="landing-tagline">Pick a persona, start a conversation. Each one responds in their own style.</p>
        <div class="landing-personas" id="landing-personas">
          <button class="landing-persona-card" data-persona="anshuman" id="land-anshuman">
            <div class="lp-img-wrap">
              <img src="images/anshuman.png" alt="Anshuman Singh" class="lp-img">
            </div>
            <span class="lp-name">Anshuman Singh</span>
            <span class="lp-role">Co-founder</span>
          </button>
          <button class="landing-persona-card" data-persona="abhimanyu" id="land-abhimanyu">
            <div class="lp-img-wrap">
              <img src="images/abhimanyu.png" alt="Abhimanyu Saxena" class="lp-img">
            </div>
            <span class="lp-name">Abhimanyu Saxena</span>
            <span class="lp-role">Co-founder</span>
          </button>
          <button class="landing-persona-card" data-persona="kshitij" id="land-kshitij">
            <div class="lp-img-wrap">
              <img src="images/kshitij.png" alt="Kshitij Mishra" class="lp-img">
            </div>
            <span class="lp-name">Kshitij Mishra</span>
            <span class="lp-role">Head of Instructors</span>
          </button>
        </div>
        <p class="landing-hint">Select a persona to begin chatting</p>
      </div>
    </div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Persona Chatbot</h1>
        <p class="logo-sub">Prompt Engineering Project</p>
      </div>
      <nav class="persona-nav">
        <button class="persona-btn" data-persona="anshuman" id="btn-anshuman">
          <img src="images/anshuman.png" alt="Anshuman Singh" class="persona-avatar-img">
          <div class="persona-info">
            <span class="persona-name">Anshuman Singh</span>
            <span class="persona-role">Co-founder</span>
          </div>
        </button>
        <button class="persona-btn" data-persona="abhimanyu" id="btn-abhimanyu">
          <img src="images/abhimanyu.png" alt="Abhimanyu Saxena" class="persona-avatar-img">
          <div class="persona-info">
            <span class="persona-name">Abhimanyu Saxena</span>
            <span class="persona-role">Co-founder</span>
          </div>
        </button>
        <button class="persona-btn" data-persona="kshitij" id="btn-kshitij">
          <img src="images/kshitij.png" alt="Kshitij Mishra" class="persona-avatar-img">
          <div class="persona-info">
            <span class="persona-name">Kshitij Mishra</span>
            <span class="persona-role">Head of Instructors</span>
          </div>
        </button>
      </nav>
      <div class="sidebar-footer">
        <p>Prompt Engineering Project</p>
      </div>
    </aside>

    <main class="chat-main" id="chat-main">
      <header class="chat-header" id="chat-header">
        <button class="menu-btn" id="menu-btn" aria-label="Toggle menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <img src="images/anshuman.png" alt="" class="header-avatar-img" id="header-avatar-img">
        <div class="header-info">
          <span class="header-name" id="header-name">Anshuman Singh</span>
          <span class="header-role" id="header-role">Co-founder, Scaler & InterviewBit</span>
        </div>
      </header>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-input-area" id="chat-input-area">
        <div class="input-wrapper">
          <textarea
            id="message-input"
            class="message-input"
            placeholder="Type your message..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="send-btn" aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
